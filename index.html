<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Proxy</title></head>
<body style="margin:0;padding:0;">
<iframe id="f" style="width:100vw;height:100vh;border:none;position:fixed;" src="about:blank"></iframe>
<script>
let url = prompt('آدرس سایت (با https://):');
if(url) {
    if(!url.startsWith('http')) url = 'https://' + url;
    document.getElementById('f').src = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
}
</script>
</body>
</html>
